<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kami Flex | Home</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #3498db;
      color: #fff;
      padding: 10px;
      text-align: center;
    }
    header nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      float: right;
    }
    header nav ul li {
      display: inline-block;
      margin-right: 20px;
    }
    header nav a {
      color: #fff;
      text-decoration: none;
      background-color: #2980b9;
      padding: 10px 20px;
      border-radius: 5px;
    }
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 100px 50px;
    }
    main h1 {
      font-size: 36px;
      margin-bottom: 20px;
      color: #3498db;
    }
    main p {
      font-size: 18px;
      margin-bottom: 20px;
    }
    footer {
      background-color: #3498db;
      color: #fff;
      padding: 10px;
      text-align: center;
      clear: both;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
    .logo {
      float: left;
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Kami Flex</div>
    <nav>
      <ul>
        <li><a href="login.html">Login</a></li>
        <li><a href="signup.html">Sign Up</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <h1 style="margin-top: 50px;">Welcome to Kami Flex</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed sit amet nulla auctor, vestibulum magna sed, convallis ex.</p>
  </main>
  <footer>
    <p>&copy; 2023 Kami Flex</p>
  </footer>
</body>
</html>
