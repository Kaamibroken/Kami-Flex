<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kami Flex | Sign Up Complete</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f0f0f0;
    }
    .signup-complete-container {
      width: 300px;
      margin: 50px auto;
      padding: 20px;
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    .signup-complete-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .signup-complete-header h2 {
      font-size: 24px;
      font-weight: bold;
      color: #3498db;
    }
    .signup-complete-header a {
      text-decoration: none;
      color: #3498db;
    }
    .signup-complete-message {
      text-align: center;
      margin-bottom: 20px;
    }
    .login-btn {
      width: 100%;
      padding: 10px;
      background-color: #3498db;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .login-btn:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <div class="signup-complete-container">
    <div class="signup-complete-header">
      <h2><a href="index.html">Kami Flex</a></h2>
      <p>Sign Up Complete</p>
    </div>
    <div class="signup-complete-message">
      <p>Thank you for signing up! Your account has been created successfully.</p>
    </div>
    <a href="login.html"><button class="login-btn">Login to your account</button></a>
  </div>
</body>
</html>
