<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Kami Flex</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f0f0f0;
    }
    .profile-container {
      width: 80%;
      margin: 50px auto;
      padding: 20px;
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    .profile-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .profile-header h1 {
      font-size: 36px;
      font-weight: bold;
      color: #337ab7;
    }
    .profile-info {
      margin-bottom: 20px;
    }
    .profile-info label {
      font-weight: bold;
      margin-right: 10px;
    }
    .back-btn {
      background-color: #337ab7;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .back-btn:hover {
      background-color: #23527c;
    }
  </style>
</head>
<body>
  <div class="profile-container">
    <div class="profile-header">
      <h1>Profile</h1>
    </div>
    <div class="profile-info">
      <label>Name:</label>
      <span id="username"></span>
    </div>
    <div class="profile-info">
      <label>Email:</label>
      <span id="email"></span>
    </div>
    <div class="profile-info">
      <label>Phone:</label>
      <span id="phone"></span>
    </div>
    <button class="back-btn" onclick="window.location.href='home.html'">Back to Home</button>
  </div>
  <script>
    // Get user data from local storage or session storage
    const userData = JSON.parse(localStorage.getItem('userData'));

    // Display user data on profile page
    document.getElementById('username').innerText = userData.name;
    document.getElementById('email').innerText = userData.email;
    document.getElementById('phone').innerText = userData.phone;
  </script>
</body>
</html>
